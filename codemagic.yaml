workflows:
  ios-void-production:
    name: Void - Production Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    environment:
      groups:
        - app_store_credentials
      
      vars:
        XCODE_WORKSPACE: "Void.xcodeproj"
        XCODE_SCHEME: "Void"
        BUNDLE_ID: "com.yourcompany.void"
      
      xcode: latest  # Используем последнюю доступную версию
      cocoapods: default
    
    triggering:
      events:
        - push
        - tag
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
    
    scripts:
      - name: 🔍 Show Xcode version
        script: |
          xcodebuild -version
          xcrun simctl list runtimes
          
      - name: 📦 Set iOS Deployment Target
        script: |
          # Проверяем, какая версия iOS SDK доступна
          xcodebuild -showsdks
          
      - name: 🏗️ Build iOS app for simulator (Debug)
        script: |
          xcodebuild \
            -project "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            clean build | xcpretty && exit ${PIPESTATUS[0]}
    
    artifacts:
      - /tmp/xcodebuild_logs/*.log
    
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  ios-void-debug:
    name: Void - Debug Build (Quick)
    max_build_duration: 30
    instance_type: mac_mini_m2
    
    environment:
      vars:
        XCODE_WORKSPACE: "Void.xcodeproj"
        XCODE_SCHEME: "Void"
      
      xcode: latest
    
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'develop'
          include: true
          source: true
        - pattern: 'feature/*'
          include: true
          source: true
        - pattern: 'main'
          include: true
          source: true
    
    scripts:
      - name: 🔍 Show environment
        script: |
          echo "Xcode version:"
          xcodebuild -version
          echo ""
          echo "Available SDKs:"
          xcodebuild -showsdks
          echo ""
          echo "Available simulators:"
          xcrun simctl list devices available
      
      - name: 🏗️ Build for simulator
        script: |
          xcodebuild \
            -project "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -configuration Debug \
            clean build | xcpretty && exit ${PIPESTATUS[0]}
    
    artifacts:
      - /tmp/xcodebuild_logs/*.log
    
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: false
          failure: true

  ios-void-archive:
    name: Void - Archive Build (No Signing)
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    environment:
      vars:
        XCODE_WORKSPACE: "Void.xcodeproj"
        XCODE_SCHEME: "Void"
      
      xcode: latest
    
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true
    
    scripts:
      - name: 🔍 Show environment
        script: |
          xcodebuild -version
          
      - name: 🏗️ Build for device (without signing)
        script: |
          xcodebuild \
            -project "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build | xcpretty && exit ${PIPESTATUS[0]}
    
    artifacts:
      - build/Release-iphoneos/*.app
      - /tmp/xcodebuild_logs/*.log
    
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
