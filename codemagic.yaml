workflows:
  ios-void-ipa:
    name: Void - Build .app (Unsigned)
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      xcode: latest

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Create project.yml
        script: |
          cat > project.yml << EOF
          name: Void
          options:
            bundleIdPrefix: com.tt2819ais
          targets:
            Void:
              type: application
              platform: iOS
              sources:
                - path: .
                  excludes:
                    - ".git"
                    - ".github"
                    - "project.yml"
                    - "*.md"
              settings:
                base:
                  PRODUCT_NAME: Void
                  PRODUCT_BUNDLE_IDENTIFIER: com.tt2819ais.void
                  INFOPLIST_FILE: Info.plist
                  CODE_SIGN_IDENTITY: ""
                  CODE_SIGNING_REQUIRED: NO
                  CODE_SIGNING_ALLOWED: NO
          EOF

      - name: Create Info.plist
        script: |
          cat > Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>com.tt2819ais.void</string>
              <key>CFBundleName</key>
              <string>Void</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
          </dict>
          </plist>
          EOF

      - name: Generate Xcode project + Build .app
        script: |
          xcodegen generate
          
          xcodebuild build \
            -project Void.xcodeproj \
            -scheme Void \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath ./build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          # Копируем .app
          mkdir -p ./build/artifact
          cp -R ./build/DerivedData/Build/Products/Release-iphoneos/Void.app ./build/artifact/
          
          # Делаем zip (это и будет твой "ipa" по сути)
          cd ./build/artifact
          zip -r Void-app.zip Void.app
          ls -la

    artifacts:
      - build/artifact/Void-app.zip

    publishing:
      email:
        recipients:
          - tt2819ais@gmail.com
        notify:
          success: true
          failure: true
