workflows:
  ios-void-ipa:
    name: Void - IPA Build (with XcodeGen)
    max_build_duration: 40
    instance_type: mac_mini_m2

    environment:
      vars:
        XCODE_SCHEME: "Void"
      xcode: latest

    triggering:
      events:
        - push
        - manual

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Create project.yml
        script: |
          cat > project.yml << EOF
          name: Void
          options:
            bundleIdPrefix: com.tt2819ais
            deploymentTarget:
              iOS: "18.0"
          
          targets:
            Void:
              type: application
              platform: iOS
              sources:
                - path: .
                  excludes:
                    - "project.yml"
                    - ".git"
                    - "*.md"
                    - "codmag*"
              settings:
                base:
                  PRODUCT_NAME: Void
                  INFOPLIST_FILE: Info.plist
                  CODE_SIGN_IDENTITY: ""
                  CODE_SIGNING_REQUIRED: NO
                  CODE_SIGNING_ALLOWED: NO
                  ENABLE_BITCODE: NO
          EOF

      - name: Create minimal Info.plist
        script: |
          cat > Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>com.tt2819ais.void</string>
              <key>CFBundleName</key>
              <string>Void</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>UIRequiredDeviceCapabilities</key>
              <array><string>arm64</string></array>
          </dict>
          </plist>
          EOF

      - name: Generate .xcodeproj
        script: |
          xcodegen generate
          ls -la

      - name: Archive and Export IPA
        script: |
          set -e
          
          xcodebuild archive \
            -project Void.xcodeproj \
            -scheme Void \
            -sdk iphoneos \
            -configuration Release \
            -archivePath ./build/Void.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO
          
          # Export IPA
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath ./build/Void.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ./build/ipa
          
          echo "✅ IPA успешно создан!"

    artifacts:
      - build/ipa/*.ipa
      - Void.xcodeproj

    publishing:
      email:
        recipients:
          - tt2819ais@gmail.com
        notify:
          success: true
          failure: true
